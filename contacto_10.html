<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sandra López | LISY</title>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  :root {
    --navy-dark: #001f33;
    --navy: #013352;
    --navy-mid: #024470;
    --gold: #F8BF07;
    --white: #ffffff;
    --text-muted: #8a9bb0;
    --card-bg: rgba(255,255,255,0.06);
    --card-border: rgba(248,191,7,0.18);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: linear-gradient(160deg, #001f33 0%, #013352 55%, #024470 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 48px 20px 48px;
  }
  .card-photo {
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 3px solid var(--gold);
    background: var(--navy-mid);
    display: flex; align-items: center; justify-content: center;
    font-size: 38px; font-weight: 700; color: var(--gold);
    overflow: hidden;
    margin-bottom: 20px;
    box-shadow: 0 8px 40px rgba(248,191,7,0.22);
  }
  .card-photo img { width:100%; height:100%; object-fit:cover; border-radius:50%; }
  .brand-logo {
    width: 52px; height: 52px;
    background: var(--gold);
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; font-weight: 800; color: var(--navy-dark);
    box-shadow: 0 6px 24px rgba(248,191,7,0.28);
    margin-bottom: 32px;
  }
  .card-name {
    font-size: 26px; font-weight: 700; color: var(--white);
    text-align: center; margin-bottom: 5px;
  }
  .card-role {
    font-size: 11px; font-weight: 600; color: var(--gold);
    text-transform: uppercase; letter-spacing: 2px;
    text-align: center; margin-bottom: 5px;
  }
  .card-company {
    font-size: 13px; color: var(--text-muted); text-align: center;
  }
  .divider {
    width: 40px; height: 2px; background: var(--gold);
    border-radius: 2px; margin: 22px auto 28px; opacity: 0.6;
  }
  .links-stack {
    width: 100%; max-width: 380px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .link-btn {
    display: flex; align-items: center; gap: 16px;
    padding: 16px 20px; border-radius: 16px;
    text-decoration: none; font-size: 15px; font-weight: 600;
    color: var(--white); transition: all 0.20s ease;
    border: 1px solid transparent; cursor: pointer;
  }
  .link-btn:active { transform: scale(0.97); }
  .link-btn.whatsapp {
    background: linear-gradient(135deg, #128C7E, #25D366);
    box-shadow: 0 4px 20px rgba(37,211,102,0.25);
  }
  .link-btn.whatsapp:hover { box-shadow: 0 6px 28px rgba(37,211,102,0.40); transform: translateY(-1px); }
  .link-btn.email, .link-btn.phone {
    background: var(--card-bg);
    border-color: var(--card-border);
    backdrop-filter: blur(8px);
  }
  .link-btn.email:hover, .link-btn.phone:hover {
    background: rgba(248,191,7,0.10);
    border-color: var(--gold);
    transform: translateY(-1px);
  }
  .btn-icon {
    width: 40px; height: 40px; border-radius: 10px;
    background: rgba(255,255,255,0.15);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .btn-label { font-size: 15px; font-weight: 600; color: var(--white); }
  .btn-sub { font-size: 12px; font-weight: 400; color: rgba(255,255,255,0.60); }
  .footer { margin-top: 40px; display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .footer-logo {
    width: 32px; height: 32px; background: var(--gold); border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: var(--navy-dark);
  }
  .footer-text { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }
</style>

</head>
