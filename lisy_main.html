<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>LISY - Tu Mejor Ingrediente</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#F8BF07;
  --white:#ffffff;
  --muted:rgba(255,255,255,0.6);
  --muted2:rgba(255,255,255,0.32);
}
html,body{min-height:100vh;font-family:"DM Sans",sans-serif;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{display:flex;justify-content:center;background:linear-gradient(160deg,#011e33 0%,#013352 50%,#012030 100%);position:relative}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 65% 45% at 80% 5%,rgba(248,191,7,0.08) 0%,transparent 70%),radial-gradient(ellipse 55% 55% at 5% 85%,rgba(248,191,7,0.05) 0%,transparent 60%);pointer-events:none;z-index:0}
.container{position:relative;z-index:1;width:100%;max-width:420px;padding:44px 22px 64px;display:flex;flex-direction:column;align-items:center}
.logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:10px;opacity:0;transform:translateY(-14px);animation:fadeDown 0.7s 0.1s ease forwards}
.logo-img{width:150px;height:auto;filter:drop-shadow(0 6px 20px rgba(0,0,0,0.35));margin-bottom:12px}
.tagline{font-weight:300;font-size:11.5px;letter-spacing:0.24em;color:var(--gold);text-transform:uppercase;text-align:center}
.divider{width:38px;height:1px;background:linear-gradient(90deg,transparent,rgba(248,191,7,0.65),transparent);margin:20px auto 24px;opacity:0;animation:fadeIn 0.5s 0.5s ease forwards}
.links{width:100%;display:flex;flex-direction:column;gap:10px}
.link-btn{display:flex;align-items:center;justify-content:space-between;width:100%;padding:14px 17px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:13px;color:var(--white);font-family:"DM Sans",sans-serif;font-size:14.5px;font-weight:500;cursor:pointer;text-decoration:none;transition:background .2s,border-color .2s,transform .15s;opacity:0;position:relative;overflow:hidden;-webkit-tap-highlight-color:transparent}
.link-btn:hover{background:rgba(255,255,255,0.09);border-color:rgba(248,191,7,0.45);transform:translateY(-2px)}
.link-btn:active{transform:scale(0.98)}
.link-btn.gold{background:rgba(248,191,7,0.09);border-color:rgba(248,191,7,0.28)}
.link-btn.gold:hover{background:rgba(248,191,7,0.17);border-color:rgba(248,191,7,0.55)}
.link-btn.wa{background:rgba(37,211,102,0.07);border-color:rgba(37,211,102,0.2)}
.link-btn.wa:hover{background:rgba(37,211,102,0.15);border-color:rgba(37,211,102,0.42)}
.link-btn.catalog{background:rgba(248,100,7,0.07);border-color:rgba(248,140,7,0.22)}
.link-btn.catalog:hover{background:rgba(248,100,7,0.14);border-color:rgba(248,140,7,0.45)}
.btn-left{display:flex;align-items:center;gap:11px}
.btn-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:rgba(255,255,255,0.08)}
.link-btn.gold .btn-icon{background:rgba(248,191,7,0.15)}
.link-btn.wa .btn-icon{background:rgba(37,211,102,0.15)}
.link-btn.catalog .btn-icon{background:rgba(248,140,7,0.15)}
.btn-arrow{font-size:18px;color:var(--muted);transition:transform .2s,color .2s;flex-shrink:0;line-height:1}
.link-btn:hover .btn-arrow{color:var(--gold);transform:translateX(3px)}
.link-btn.wa:hover .btn-arrow{color:#25D366}
.link-btn.catalog:hover .btn-arrow{color:#f8a007}
.dropdown-wrap{width:100%;opacity:1}.dropdown-wrap .link-btn{opacity:1;animation:fadeUp .5s .42s ease both}
.dropdown-trigger.open .btn-arrow{transform:rotate(90deg)!important;color:var(--gold)}
.dropdown-menu{display:none;flex-direction:column;gap:6px;padding:6px 0 2px 13px}
.dropdown-menu.open{display:flex}
.sub-btn{display:flex;align-items:center;gap:10px;padding:11px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-left:2px solid rgba(248,191,7,0.38);border-radius:0 11px 11px 0;color:var(--white);font-family:"DM Sans",sans-serif;font-size:13.5px;font-weight:400;cursor:pointer;text-decoration:none;transition:background .2s,border-color .2s,transform .15s;-webkit-tap-highlight-color:transparent}
.sub-btn:hover{background:rgba(255,255,255,0.08);border-left-color:var(--gold);transform:translateX(3px)}
.contact-section{width:100%;margin-top:18px;opacity:0;animation:fadeUp 0.5s 1.1s ease forwards}
.contact-label{font-size:10px;font-weight:500;letter-spacing:0.22em;color:var(--muted2);text-transform:uppercase;text-align:center;margin-bottom:10px}
.contact-row{display:flex;flex-direction:column;gap:8px}
.contact-item{display:flex;align-items:center;justify-content:center;gap:9px;padding:11px 14px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:10px;color:rgba(255,255,255,0.7);font-size:13px;text-decoration:none;transition:background .2s,color .2s,border-color .2s;-webkit-tap-highlight-color:transparent}
.contact-item:hover{background:rgba(255,255,255,0.07);border-color:rgba(255,255,255,0.14);color:var(--white)}
.footer{margin-top:30px;text-align:center;opacity:0;animation:fadeIn 0.6s 1.3s ease forwards}
.footer-sub{font-size:10px;letter-spacing:0.12em;color:rgba(255,255,255,0.2);text-transform:uppercase}
@keyframes fadeDown{to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{to{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.links>*:nth-child(1){animation:fadeUp .5s .30s ease forwards}
.links>*:nth-child(2){animation:fadeUp .5s .42s ease forwards}
.links>*:nth-child(3){animation:fadeUp .5s .54s ease forwards}
.links>*:nth-child(4){animation:fadeUp .5s .66s ease forwards}
.links>*:nth-child(5){animation:fadeUp .5s .78s ease forwards}
svg.ic{display:block;flex-shrink:0}
</style>
</head>
